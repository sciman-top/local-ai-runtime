policy_surface_globs:
  - AGENTS.md
  - docs/specs/**
  - scripts/governance/**
  - docs/architecture/**

sensitive_paths:
  - .env
  - .env.*
  - .git/config
  - .ssh/**
  - secrets/**

verification_profiles:
  read_only:
    build: null
    lint: null
    typecheck: null
    test: null
    contract: null
    hotspot: null
  fast:
    build: null
    lint: null
    typecheck: null
    test: "uv run --project .\\runtime\\host-orchestrator python -m pytest"
    contract: "python .\\scripts\\verify-planning-status.py"
    hotspot: null
  full:
    build: null
    lint: null
    typecheck: null
    test: "uv run --project .\\runtime\\host-orchestrator python -m pytest"
    contract: "python .\\scripts\\verify-planning-status.py"
    hotspot: "pwsh -NoProfile -ExecutionPolicy Bypass -File .\\scripts\\governance\\preflight.ps1 -DisableAutoCommit -Json"

continuation_policies:
  auto:
    auto_continue: true
    review_on_risk_levels:
      - high
      - critical
    pause_on_policy_surface: true
    pause_on_verification_failure: true
  guarded:
    auto_continue: false
    review_on_risk_levels:
      - medium
      - high
      - critical
    pause_on_policy_surface: true
    pause_on_verification_failure: true

retry_policies:
  default:
    retry_on_gate_failure: true
    retry_on_worker_failure: true
    max_attempts: 3

adaptive_orchestration:
  policy_version: "adaptive_orchestration.v1"
  active_profile: "observe_default"

  profiles:
    observe_default:
      effect: "observe"
      default_mode: "single_agent"
      max_concurrent_subagents: 3
      max_total_subagents: 6
      max_tree_depth: 1
      min_independent_workstreams: 2
      parallel_read_only: true
      parallel_writers: false
      require_isolated_worktree_for_writers: true
      write_conflict_policy: "serialize"
      stop_policy: "stop_on_scope_or_contract_conflict"

    guarded_read_only:
      effect: "guarded"
      default_mode: "single_agent"
      max_concurrent_subagents: 3
      max_total_subagents: 6
      max_tree_depth: 1
      min_independent_workstreams: 2
      parallel_read_only: true
      parallel_writers: false
      require_isolated_worktree_for_writers: true
      write_conflict_policy: "serialize"
      stop_policy: "stop_on_scope_or_contract_conflict"

    guarded_isolated_writers:
      effect: "guarded"
      default_mode: "single_agent"
      max_concurrent_subagents: 3
      max_total_subagents: 6
      max_tree_depth: 1
      min_independent_workstreams: 2
      parallel_read_only: true
      parallel_writers: true
      require_isolated_worktree_for_writers: true
      write_conflict_policy: "serialize"
      stop_policy: "stop_on_scope_or_contract_conflict"

  model_routes:
    strong_review:
      roles: ["spec_reviewer", "quality_reviewer"]
      intents: []
      risk_levels: []
      worker_profile: "adaptive_review"
      model: "gpt-5.6-sol"
      reasoning_effort: "high"
    strong_control:
      roles: ["master", "closeout"]
      intents: []
      risk_levels: []
      worker_profile: "local_maint"
      model: "gpt-5.6-sol"
      reasoning_effort: "high"
    strong_read:
      roles: ["explorer"]
      intents: []
      risk_levels: ["high", "critical"]
      worker_profile: "adaptive_read"
      model: "gpt-5.6-sol"
      reasoning_effort: "high"
    strong_risk:
      roles: []
      intents: []
      risk_levels: ["high", "critical"]
      worker_profile: "adaptive_write"
      model: "gpt-5.6-sol"
      reasoning_effort: "high"
    efficient_read:
      roles: ["explorer"]
      intents: ["research", "docs", "general"]
      risk_levels: ["low", "medium"]
      worker_profile: "adaptive_read"
      model: "gpt-5.6-terra"
      reasoning_effort: "medium"
    default:
      roles: []
      intents: []
      risk_levels: []
      worker_profile: "adaptive_write"
      model: "gpt-5.6-sol"
      reasoning_effort: "high"

  capability_routes:
    general: []
    bugfix: ["systematic_debugging", "test_first"]
    feature: ["test_first"]
    refactor: ["test_first"]
    research: ["exploration"]
    docs: ["exploration"]
    review: ["spec_review", "quality_review"]
    migration: ["clarification", "test_first"]
    operations: ["clarification"]

  available_capabilities:
    - "clarification"
    - "systematic_debugging"
    - "test_first"
    - "exploration"
    - "spec_review"
    - "quality_review"
    - "worktree_isolation"
